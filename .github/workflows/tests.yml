name: Tests Java - Exercice 14

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Exécution des tests
        working-directory: "03_exercices/Mes exercice/exercice14"
        run: mvn test

      - name: Publication des rapports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapports-tests
          path: |
            03_exercices/Mes exercice/exercice14/target/site/jacoco/
            03_exercices/Mes exercice/exercice14/target/cucumber-report.html
            03_exercices/Mes exercice/exercice14/target/surefire-reports/
